<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lucaco tech</title>
  <meta name="description" content="Lucaco Tecnologia — holding de tecnologia, inovação e soluções digitais." />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --text: #e8e8e8;
      --text-muted: #6b6b6b;
      --text-subtle: #444444;
      --green-primary: #4ade80;
      --green-dim: #22c55e;
      --green-top: #7ccc69;
      --green-left: #46933b;
      --green-right: #67b858;
      --green-glow: rgba(74, 222, 128, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      /* fallback */
      min-height: 100dvh;
      padding: 24px;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    /* Subtle radial glow behind logo */
    body::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin: auto 0;
      animation: fadeIn 1.2s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    .logo {
      width: 140px;
      height: 140px;
      display: block;
      margin-bottom: 4px;
      filter: drop-shadow(0 0 40px rgba(74, 222, 128, 0.06));
      transition: filter 0.6s ease;
    }

    .container:hover .logo {
      filter: drop-shadow(0 0 60px rgba(74, 222, 128, 0.12));
    }

    /* Wordmark */
    .wordmark {
      display: flex;
      align-items: baseline;
      gap: 12px;
      line-height: 1;
      letter-spacing: -0.045em;
      white-space: nowrap;
      user-select: none;
    }

    .lucaco {
      font-size: 80px;
      font-weight: 700;
      color: var(--text);
    }

    .tech {
      font-size: 34px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 10px;
      opacity: 0;
      animation: dividerIn 0.8s ease-out 0.4s forwards;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--text-subtle);
      margin: 32px 0 28px;
      opacity: 0;
      animation: dividerIn 0.8s ease-out 0.6s forwards;
    }

    @keyframes dividerIn {
      to {
        opacity: 1;
      }
    }

    /* Contact */
    .contact {
      opacity: 0;
      animation: contactIn 0.8s ease-out 0.8s forwards;
    }

    @keyframes contactIn {
      to {
        opacity: 1;
      }
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: contactIn 0.8s ease-out 1s forwards;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .footer-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .footer-contact {
      font-size: 12px;
    }

    .footer-legal {
      font-size: 11px;
      color: var(--text-subtle);
      line-height: 1.6;
    }

    .footer-links {
      font-size: 12px;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: var(--green-primary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .logo {
        width: 112px;
        height: 112px;
      }

      .lucaco {
        font-size: 56px;
      }

      .tech {
        font-size: 24px;
        gap: 8px;
      }

      .wordmark {
        gap: 8px;
      }

      body::before {
        width: 400px;
        height: 400px;
      }

      .footer {
        position: relative;
        bottom: auto;
        margin-top: auto;
        padding: 24px 0 0 0;
      }
    }

    @media (max-width: 480px) {
      .logo {
        width: 88px;
        height: 88px;
      }

      .lucaco {
        font-size: 42px;
      }

      .tech {
        font-size: 18px;
      }

      .subtitle {
        font-size: 8px;
        letter-spacing: 0.2em;
        margin-top: 12px;
      }

      .wordmark {
        gap: 6px;
      }

      .divider {
        margin: 24px 0 20px;
      }
    }
  </style>
</head>

<body>
  <main class="container" aria-label="Lucaco Tech">
    <svg class="logo" viewBox="0 0 140 140" aria-hidden="true" role="img">
      <polygon points="70,12 122,40 70,69 18,40" fill="var(--green-top)"></polygon>
      <polygon points="18,40 70,69 70,128 18,99" fill="var(--green-left)"></polygon>
      <polygon points="122,40 70,69 70,128 122,99" fill="var(--green-right)"></polygon>
    </svg>

    <div class="wordmark">
      <span class="lucaco">lucaco</span>
      <span class="tech">tech</span>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <span class="subtitle">AI-FIRST COMPANY</span>

  </main>

  <footer class="footer">
    <div class="footer-group footer-contact">
      <span>
        <a href="mailto:contato@lucaco.tech">contato@lucaco.tech</a> &nbsp;&middot;&nbsp; 
        <a href="mailto:financeiro@lucaco.tech">financeiro@lucaco.tech</a>
      </span>
    </div>

    <div class="footer-group footer-legal">
      <span>Lucaco Tecnologia LTDA — CNPJ 65.670.810/0001-09</span>
      <span>Av. Paulista, 1636, Conj 4 Pavmto 15 — Bela Vista, São Paulo - SP, 01310-200</span>
    </div>

    <div class="footer-group footer-links">
      <span>
        <a href="/termos-de-uso.html">Termos de Uso</a> &nbsp;&middot;&nbsp; 
        <a href="/politica-de-privacidade.html">Política de Privacidade</a>
      </span>
    </div>
  </footer>
</body>

</html>
