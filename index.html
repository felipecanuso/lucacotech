<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lucaco tech</title>
  <meta name="description" content="lucaco tech" />
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #000000;
      --muted: #7a7a7a;
      --green-top: #7ccc69;
      --green-left: #46933b;
      --green-right: #67b858;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateY(-2%);
    }

    .logo {
      width: 168px;
      height: 168px;
      display: block;
      margin-bottom: 2px;
    }

    .wordmark {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      line-height: 1;
      letter-spacing: -0.04em;
      white-space: nowrap;
    }

    .lucaco {
      font-size: 96px;
      font-weight: 700;
      color: var(--text);
    }

    .tech {
      margin-left: 14px;
      margin-top: 24px;
      font-size: 42px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: -0.03em;
    }

    @media (max-width: 900px) {
      .logo {
        width: 132px;
        height: 132px;
      }

      .lucaco {
        font-size: 72px;
      }

      .tech {
        font-size: 32px;
        margin-top: 18px;
        margin-left: 10px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 20px;
      }

      .logo {
        width: 104px;
        height: 104px;
      }

      .lucaco {
        font-size: 48px;
      }

      .tech {
        font-size: 24px;
        margin-top: 11px;
        margin-left: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap" aria-label="lucaco tech landing page">
    <section class="brand" aria-label="lucaco tech brand">
      <svg class="logo" viewBox="0 0 140 140" aria-hidden="true" role="img">
        <polygon points="70,12 122,40 70,69 18,40" fill="var(--green-top)"></polygon>
        <polygon points="18,40 70,69 70,128 18,99" fill="var(--green-left)"></polygon>
        <polygon points="122,40 70,69 70,128 122,99" fill="var(--green-right)"></polygon>
      </svg>

      <div class="wordmark" aria-label="lucaco tech">
        <span class="lucaco">lucaco</span>
        <span class="tech">tech</span>
      </div>
    </section>
  </main>
</body>
</html>
